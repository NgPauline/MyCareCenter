<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout('Consultations', '', ~{::section})}">

<section th:fragment="section">

    <div th:if="${param.error}" class="alert alert-danger mb-3">
        <span th:switch="${param.error}">
            <span th:case="'nonSupprimable'">Impossible de supprimer une consultation passée.</span>
            <span th:case="'nonModifiable'">Impossible de modifier une consultation passée.</span>
            <span th:case="*">Une erreur est survenue.</span>
        </span>
    </div>


    <!-- HEADER -->
    <div class="list-header d-flex justify-content-between align-items-center">

        <h2 class="m-0 d-flex align-items-center">
            Consultations

            <!-- Bouton recherche -->
            <button class="btn-circle ml-2"
                    data-search-toggle="searchBarConsultations"
                    title="Rechercher une consultation">
                <img th:src="@{/images/rechercher.png}" alt="Rechercher" class="icon-22">
            </button>
        </h2>

        <!-- Ajouter -->
        <a sec:authorize="hasAnyRole('DIRECTEUR','SOIGNANT')"
           th:href="@{/consultations/new}"
           class="btn-circle"
           title="Ajouter une consultation">
            <img th:src="@{/images/ajouter.png}" alt="Ajouter" class="icon-26">
        </a>

    </div>

    <!-- BARRE DE RECHERCHE -->
    <form id="searchBarConsultations" class="mt-3" method="get" style="display:none;">
        <div class="input-group">
            <input type="text" name="q" class="form-control"
                   placeholder="Rechercher une consultation..."
                   th:value="${param.q}">
            <div class="input-group-append">
                <button class="btn-gold" type="submit" title="Lancer la recherche">
                    <img th:src="@{/images/rechercher.png}" alt="Rechercher" class="icon-20">
                </button>
            </div>
        </div>
    </form>

    <!-- TABLEAU -->
    <div class="card mt-3">
        <div class="table-responsive"> 
        <table class="table-modern">

            <thead>
                <tr>
                    <th>Date</th>
                    <th>Résident</th>
                    <th>Soignant</th>
                    <th>Diagnostic</th>
                    <th class="text-right">Actions</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="c : ${consultations}">
                    <td th:text="${#temporals.format(c.date,'dd/MM/yyyy')}"></td>
                    <td th:text="${c.resident.nom + ' ' + c.resident.prenom}"></td>
                    <td th:text="${c.soignant.nom + ' ' + c.soignant.prenom}"></td>
                    <td th:text="${c.diagnostic}"></td>

                    <td class="text-right">

                        <!-- Voir -->
                        <a sec:authorize="hasAnyRole('DIRECTEUR','SOIGNANT')"
                           th:href="@{|/consultations/${c.idConsultation}|}"
                           class="btn-circle mr-2"
                           title="Voir la consultation">
                            <img th:src="@{/images/voir.png}" alt="Voir" class="icon-24">
                        </a>

                        <!-- Modifier -->
                        <a sec:authorize="hasAnyRole('DIRECTEUR','SOIGNANT')"
                           th:href="@{|/consultations/${c.idConsultation}/edit|}"
                           class="btn-circle mr-2"
                           title="Modifier cette consultation">
                            <img th:src="@{/images/modifier.png}" alt="Modifier" class="icon-24">
                        </a>

                        <!-- Supprimer -->
                        <form sec:authorize="hasAnyRole('DIRECTEUR','SOIGNANT')"
                              th:action="@{|/consultations/${c.idConsultation}/delete|}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Supprimer cette consultation ?');">
                            <button class="btn-circle" title="Supprimer cette consultation">
                                <img th:src="@{/images/supprimer.png}" alt="Supprimer" class="icon-24">
                            </button>
                        </form>

                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(consultations)}">
                    <td colspan="5" class="text-center text-muted py-3">
                        Aucune consultation trouvée.
                    </td>
                </tr>

            </tbody>

        </table>
        </div>
    </div>

</section>
</html>
