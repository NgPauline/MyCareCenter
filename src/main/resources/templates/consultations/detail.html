<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Détails consultation', 'Informations générales', ~{::section})}">

<th:block th:fragment="section"
          xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <!-- MESSAGE GLOBAL -->
    <div th:if="${param.error}" class="alert alert-danger mb-3">
        <span th:switch="${param.error != null ? param.error[0] : ''}">
            <span th:case="*">Une erreur est survenue.</span>
        </span>
    </div>


    <!-- BARRE HAUTE : RETOUR + ACTIONS -->
           <div class="top-bar d-flex justify-content-between align-items-center mb-2">

    <a th:href="${residentId != null} ? @{/consultations(resident=${residentId})} : @{/consultations}"
       class="btn-circle" title="Retour">
        <img src="/images/retour.png" class="icon-26">
    </a>

        <div class="detail-actions d-flex gap-3">
            
                <form sec:authorize="hasRole('DIRECTEUR')"
                    th:action="@{|/consultations/${consultation.idConsultation}/delete|}"
                    method="post"
                    onsubmit="return confirm('Supprimer cette consultation ?');">
                    <button class="btn-circle">
                        <img src="/images/supprimer.png" class="icon-26">
                    </button>
                </form>
            </div>
        </div>

    <!-- TITRE CENTRÉ -->
    <div class="text-center mb-1">
        <h2 class="consult-title">
            Consultation du 
            <span th:text="${#temporals.format(consultation.date,'dd/MM/yyyy')}"></span>
        </h2>
    </div>

    <!-- SOUS-TITRE : RÉSIDENT + SOIGNANT -->
    <div class="text-center mb-4">
        <h4 class="consult-subtitle">
            <span th:text="|${consultation.resident.nom} ${consultation.resident.prenom}|"></span>
        </h4>
    </div>

    <!-- CONTENU EN DEUX COLONNES -->
    <div class="row mt-3">

        <!-- COLONNE GAUCHE -->
        <div class="col-12 col-md-6">

            <!-- BLOC INFORMATIONS -->
            <div class="card detail-card p-3 mb-4">

                <div class="table-responsive"> 
                <table class="detail-table">
                    <tbody>

                        <tr>
                            <th>Date & heure</th>
                            <td th:text="${#temporals.format(consultation.date,'dd/MM/yyyy HH:mm')}"></td>
                        </tr>

                        <tr>
                            <th>Durée</th>
                            <td th:text="${consultation.duree + ' min'}"></td>
                        </tr>

                        <tr>
                            <th>Heure de fin</th>
                            <td th:text="${#temporals.format(consultation.heureFin,'HH:mm')}"></td>
                        </tr>

                        <tr>
                            <th>Résident</th>
                            <td th:text="|${consultation.resident.nom} ${consultation.resident.prenom}|"></td>
                        </tr>

                        <tr>
                            <th>Soignant</th>
                            <td th:text="|${consultation.soignant.nom} ${consultation.soignant.prenom}|"></td>
                        </tr>

                        <tr>
                            <th>Diagnostic</th>
                            <td th:text="${consultation.diagnostic}"></td>
                        </tr>

                        <tr>
                            <th>Observations</th>
                            <td th:text="${consultation.observations}"></td>
                        </tr>

                    </tbody>
                </table>
                </div>
            </div>

        </div>

        <!-- COLONNE DROITE (vide pour harmonie) -->
        <div class="col-12 col-md-6"></div>

    </div>

</th:block>
</html>
