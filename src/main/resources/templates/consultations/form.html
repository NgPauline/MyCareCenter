<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Consultation', 'Formulaire consultation', ~{::section})}">
 
<section th:fragment="section" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
 
    <!-- MESSAGE GLOBAL -->
    <div th:if="${param.error}" class="alert alert-danger mb-3">
        <span th:switch="${param.error != null ? param.error[0] : ''}">
            <span th:case="'nonModifiable'">Cette consultation est passée : modification impossible.</span>
            <span th:case="'nonSupprimable'">Cette consultation est passée : suppression impossible.</span>
            <span th:case="*">Une erreur est survenue.</span>
        </span>
    </div>
 
    <div class="form-header d-flex justify-content-between align-items-center">
        <h2 class="m-0" th:text="${isEdit} ? 'Modifier la consultation' : 'Ajouter une consultation'"></h2>
        <div></div>
    </div>
 
    <form sec:authorize="hasAnyRole('DIRECTEUR','SOIGNANT')"
          th:action="@{${submitUrl}}"
          th:object="${consultation}"
          method="post"
          class="form-card">
 
        <div class="form-grid">
 
            <!-- DATE -->
                <div>
                    <label>Date et heure</label>
                    <input type="datetime-local" th:field="*{date}" class="form-control" />
                    <div class="error" th:errors="*{date}"></div>
                </div>

                <!-- DURÉE -->
                <div>
                    <label>Durée (minutes)</label>
                    <input type="number" th:field="*{duree}" class="form-control" min="1">
                    <div class="error" th:errors="*{duree}"></div>
                </div>
                            <!-- RÉSIDENT pré-rempli (venant d'une fiche résident) -->
            <div th:if="${residentId != null}">
                <label>Résident</label>
                <input type="text"
                    class="form-control"
                    th:value="${residentPreRempli != null
                        ? residentPreRempli.nom + ' ' + residentPreRempli.prenom
                        : (consultation.resident != null
                            ? consultation.resident.nom + ' ' + consultation.resident.prenom
                            : '')}"
                    readonly>
                <input type="hidden" name="residentId" th:value="${residentId}">
                <div class="error" th:errors="*{resident}"></div>
            </div>

            <!-- RÉSIDENT sélection libre -->
            <div th:if="${residentId == null}">
                <label>Résident</label>
                <select name="residentId" class="form-control">
                    <option th:each="r : ${residents}"
                            th:value="${r.idPersonne}"
                            th:selected="${consultation.resident != null and consultation.resident.idPersonne == r.idPersonne}"
                            th:text="${r.nom + ' ' + r.prenom}">
                    </option>
                </select>
            </div>
 
            <!-- SOIGNANT : dropdown pour DIRECTEUR -->
            <div sec:authorize="hasRole('DIRECTEUR')">
                <label>Soignant</label>
                <select name="soignantId" class="form-control">
                    <option th:each="s : ${soignants}"
                            th:value="${s.idPersonne}"
                            th:selected="${consultation.soignant != null and consultation.soignant.idPersonne == s.idPersonne}"
                            th:text="${s.nom + ' ' + s.prenom}">
                    </option>
                </select>
            </div>
 
            <!-- SOIGNANT : champ pré-rempli pour SOIGNANT connecté -->
            <div sec:authorize="hasRole('SOIGNANT')">
                <label>Soignant</label>
                <input type="text"
                       class="form-control"
                       th:value="${soignantConnecte != null
                           ? soignantConnecte.nom + ' ' + soignantConnecte.prenom
                           : (consultation.soignant != null ? consultation.soignant.nom + ' ' + consultation.soignant.prenom : '')}"
                       readonly>
                <input type="hidden"
                       name="soignantId"
                       th:value="${soignantConnecte != null
                           ? soignantConnecte.idPersonne
                           : (consultation.soignant != null ? consultation.soignant.idPersonne : '')}">
            </div>
 
            <!-- DIAGNOSTIC -->
            <div>
                <label>Diagnostic</label>
                <textarea th:field="*{diagnostic}" rows="3" class="form-control"></textarea>
                <div class="error" th:errors="*{diagnostic}"></div>
            </div>
 
            <!-- OBSERVATIONS -->
            <div>
                <label>Observations</label>
                <textarea th:field="*{observations}" rows="4" class="form-control"></textarea>
            </div>
 
        </div>
 
        <div class="form-actions mt-3">
            <button class="btn-gold">Enregistrer</button>
            <a th:href="${residentId != null} ? @{/consultations(resident=${residentId})} : @{/consultations}"
             class="btn-ghost">Annuler</a>
        </div>
 
    </form>

</section>
</html>
