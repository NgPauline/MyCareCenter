<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareCenter – Connexion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
</head>

<body class="login-page"
      th:style="'background-image: url(' + @{/images/fond.png} + ');'">

    <!-- FORMULAIRE À DROITE -->
    <div class="login-container">

        <div class="text-center mb-4">
            <img th:src="@{/images/logo.png}" alt="Logo" class="login-logo">
            <h1 class="login-brand">CareCenter</h1>
        </div>

        <h2 class="login-title">Connexion</h2>
        <p class="login-subtitle">Bienvenue, veuillez vous identifier</p>

        <!-- ERREUR -->
        <div th:if="${param.error}" class="login-alert login-alert-error">
            <i class="fas fa-exclamation-circle mr-2"></i>
            Matricule ou mot de passe incorrect
        </div>

        <!-- DÉCONNEXION -->
        <div th:if="${param.logout}" class="login-alert login-alert-success">
            <i class="fas fa-check-circle mr-2"></i>
            Vous êtes déconnecté
        </div>

        <form th:action="@{/login}" method="post">

            <div class="login-field">
                <i class="fas fa-id-badge login-field-icon"></i>
                <input type="text" name="username" placeholder="Matricule" required class="login-input"/>
            </div>

            <div class="login-field">
                <i class="fas fa-lock login-field-icon"></i>
                <input type="password" name="password" placeholder="Mot de passe" required class="login-input"/>
            </div>

            <button type="submit" class="login-btn">
                Se connecter
                <i class="fas fa-arrow-right ml-2"></i>
            </button>

        </form>

        <p class="login-footer">80% des handicaps sont invisibles</p>

    </div>

</body>
</html>
