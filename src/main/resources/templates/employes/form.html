<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Employé', 'Formulaire employé', ~{::section})}">

<section th:fragment="section" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <!-- MESSAGE GLOBAL -->
    <div th:if="${param.error}" class="alert alert-danger mb-3">
        <span th:switch="${param.error != null ? param.error[0] : ''}">
            <span th:case="'introuvable'">Employé introuvable.</span>
            <span th:case="'directeur'">Il existe déjà un directeur dans le système.</span>
            <span th:case="'age'">L’employé doit avoir au moins 18 ans.</span>
            <span th:case="*">Une erreur est survenue.</span>
        </span>
    </div>

    <div class="form-header d-flex justify-content-between align-items-center">

        <a th:href="@{/employes}" class="btn-circle" title="Retour">
            <img src="/images/retour.png" class="icon-26">
        </a>

        <h2 class="m-0" th:text="${isEdit} ? |Modifier l\'employé| : 'Ajouter un employé'"></h2>

        <div></div>

    </div>

    <!-- FORMULAIRE -->
    <form sec:authorize="hasAnyRole('DIRECTEUR','ADMINISTRATIF')"
          th:action="@{${submitUrl}}" th:object="${employe}"
          method="post" class="form-card">

        <div class="form-grid">

            <div>
                <label>Nom</label>
                <input type="text" th:field="*{nom}" class="form-control">
                <div class="error" th:errors="*{nom}"></div>
            </div>

            <div>
                <label>Prénom</label>
                <input type="text" th:field="*{prenom}" class="form-control">
                <div class="error" th:errors="*{prenom}"></div>
            </div>

            <!-- Date de naissance -->
                <div>
                    <label>Date de naissance</label>
                    <input type="date"
                    th:field="*{dateNaissance}"
                    class="form-control">
                    <div class="error" th:errors="*{dateNaissance}"></div>

                </div>

            <div>
                <label>Téléphone</label>
                <input type="tel" id="telephone" th:field="*{telephone}" class="form-control">
                <div class="error" th:errors="*{telephone}"></div>
            </div>

            <div>
                <label>Adresse</label>
                <input type="text" th:field="*{adresse}" class="form-control">
            </div>

            <!-- Matricule généré automatiquement -->
            <input type="hidden" th:field="*{matricule}">
            <input type="hidden" th:field="*{password}">
            
            <!-- RÔLE (remplace le hidden) -->
                <div>
                    <label>Rôle</label>
                    <select th:field="*{roleApp}" class="form-control">
                        <option value="">-- Choisir --</option>
                        <option value="DIRECTEUR">Directeur</option>
                        <option value="ADMINISTRATIF">Administratif</option>
                        <option value="SOIGNANT">Soignant</option>
                        <option value="EDUCATEUR">Éducateur</option>
                        <option value="FINANCE">Finance</option>
                    </select>
                </div>


            <div>
                <label>Poste</label>
                <input type="text" th:field="*{poste}" class="form-control">
            </div>

            <div>
                <label>Salaire (€)</label>
                <input type="number" step="0.01" th:field="*{salaire}" class="form-control">
            </div>

        </div>

        <div class="form-actions mt-3">
            <button class="btn-gold">Enregistrer</button>
            <a th:href="@{/employes}" class="btn-ghost">Annuler</a>
        </div>

    </form>

</section>
</html>
