<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout('Traitements', '', ~{::section})}">

<th:block th:fragment="section">

    <!-- MESSAGE GLOBAL -->
    <div th:if="${param.error}" class="alert alert-danger mb-3">
        <span th:switch="${param.error}">
            <span th:case="'introuvable'">Traitement introuvable.</span>
            <span th:case="'resident'">Résident introuvable.</span>
            <span th:case="*">Une erreur est survenue.</span>
        </span>
    </div>


    <!-- HEADER -->
    <div class="list-header d-flex justify-content-between align-items-center">

        <h2 class="m-0 d-flex align-items-center">
            Traitements

            <button class="btn-circle ml-2"
                    data-search-toggle="searchBarTraitements"
                    title="Rechercher un traitement">
                <img th:src="@{/images/rechercher.png}" class="icon-22">
            </button>
        </h2>

        <!-- Ajouter -->
        <a sec:authorize="hasAnyRole('DIRECTEUR','SOIGNANT')"
           th:href="@{/traitements/new}"
           class="btn-circle"
           title="Ajouter un traitement">
            <img th:src="@{/images/ajouter.png}" class="icon-26">
        </a>

    </div>

    <!-- BARRE DE RECHERCHE -->
    <form id="searchBarTraitements" class="mt-3" method="get" style="display:none;">
        <div class="input-group">
            <input type="text" name="q" class="form-control"
                   placeholder="Rechercher un traitement..."
                   th:value="${param.q}">
            <div class="input-group-append">
                <button class="btn-gold" type="submit">
                    <img th:src="@{/images/rechercher.png}" class="icon-20">
                </button>
            </div>
        </div>
    </form>

    <!-- TABLEAU PREMIUM -->
    <div class="card mt-3">
        <div class="table-responsive"> 

        <table class="table-modern">

            <thead>
                <tr>
                    <th>Médicament</th>
                    <th>Résident</th>
                    <th>Début</th>
                    <th>Fin</th>
                    <th>Fréquence</th>
                    <th>Validité</th>
                    <th class="text-right">Actions</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="t : ${traitements}">
                    <td th:text="${t.medicament}"></td>

                    <td th:text="${t.dossierMedical.resident.nom + ' ' + t.dossierMedical.resident.prenom}"></td>

                    <td th:text="${#temporals.format(t.dateDebut,'dd/MM/yyyy')}"></td>

                    <td th:text="${#temporals.format(t.dateFin,'dd/MM/yyyy')}"></td>

                    <td th:text="${t.frequence}"></td>

                    <td>
                        <span th:if="${t.actif}" class="badge badge-success">Actif</span>
                        <span th:if="${!t.actif}" class="badge badge-danger">Expiré</span>
                    </td>

                    <td class="text-right">

                        <!-- Voir -->
                        <a sec:authorize="hasAnyRole('DIRECTEUR','SOIGNANT')"
                           th:href="@{|/traitements/${t.idTraitement}|}"
                           class="btn-circle mr-2"
                           title="Voir le traitement">
                            <img th:src="@{/images/voir.png}" class="icon-24">
                        </a>

                        <!-- Modifier -->
                        <a sec:authorize="hasAnyRole('DIRECTEUR','SOIGNANT')"
                           th:href="@{|/traitements/${t.idTraitement}/edit|}"
                           class="btn-circle mr-2"
                           title="Modifier ce traitement">
                            <img th:src="@{/images/modifier.png}" class="icon-24">
                        </a>

                        <!-- Supprimer -->
                        <form sec:authorize="hasRole('DIRECTEUR')"
                              th:action="@{|/traitements/${t.idTraitement}/delete|}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Supprimer ce traitement ?');">
                            <button class="btn-circle" title="Supprimer ce traitement">
                                <img th:src="@{/images/supprimer.png}" class="icon-24">
                            </button>
                        </form>

                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(traitements)}">
                    <td colspan="7" class="text-center text-muted py-3">
                        Aucun traitement trouvé.
                    </td>
                </tr>

            </tbody>

        </table>
        </div>
    </div>

</th:block>
</html>
