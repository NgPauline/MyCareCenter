<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Détails traitement', 'Informations générales', ~{::section})}">

<th:block th:fragment="section"
          xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <!-- MESSAGE GLOBAL -->
    <div th:if="${param.error}" class="alert alert-danger mb-3">
        <span th:switch="${param.error != null ? param.error[0] : ''}">
            <span th:case="'introuvable'">Traitement introuvable.</span>
            <span th:case="'resident'">Résident introuvable.</span>
            <span th:case="*">Une erreur est survenue.</span>
        </span>
    </div>


    <!-- BARRE HAUTE : RETOUR + ACTIONS -->
    <div class="top-bar d-flex justify-content-between align-items-center mb-2">

            <a th:href="${residentId != null} ? @{/traitements(resident=${residentId})} : @{/traitements}"
            class="btn-circle" title="Retour">
                <img src="/images/retour.png" class="icon-26">
            </a>

            <div class="detail-actions d-flex gap-3">

                <a sec:authorize="hasAnyRole('DIRECTEUR','SOIGNANT')"
                th:href="@{/traitements/{id}/edit(id=${traitement.idTraitement}, residentId=${residentId})}"
                class="btn-circle">
                    <img src="/images/modifier.png" class="icon-26">
                </a>

                <form sec:authorize="hasAnyRole('DIRECTEUR','SOIGNANT')"
                    th:action="@{|/traitements/${traitement.idTraitement}/delete|}"
                    method="post"
                    onsubmit="return confirm('Supprimer ce traitement ?');">
                    <button class="btn-circle">
                        <img src="/images/supprimer.png" class="icon-26">
                    </button>
                </form>

            </div>
        </div>

    <!-- TITRE CENTRÉ -->
    <div class="text-center mb-1">
        <h2 class="traitement-title" th:text="${traitement.medicament}"></h2>
    </div>

    <!-- SOUS-TITRE : NOM DU RÉSIDENT -->
    <div class="text-center mb-4">
        <h4 class="traitement-subtitle"
            th:text="|${traitement.dossierMedical.resident.nom} ${traitement.dossierMedical.resident.prenom}|">
        </h4>
    </div>

    <!-- CONTENU EN DEUX COLONNES -->
    <div class="row mt-3">

        <!-- COLONNE GAUCHE -->
        <div class="col-12 col-md-6">

            <!-- BLOC INFORMATIONS -->
            <div class="card detail-card p-3">
              <div class="table-responsive">

                <table class="detail-table">
                    <tbody>

                        <tr><th>Médicament</th><td th:text="${traitement.medicament}"></td></tr>
                        <tr><th>Dosage</th><td th:text="${traitement.dosage}"></td></tr>
                        <tr><th>Fréquence</th><td th:text="${traitement.frequence}"></td></tr>

                        <tr>
                            <th>Date début</th>
                            <td th:text="${#temporals.format(traitement.dateDebut,'dd/MM/yyyy')}"></td>
                        </tr>

                        <tr>
                            <th>Date fin</th>
                            <td th:text="${#temporals.format(traitement.dateFin,'dd/MM/yyyy')}"></td>
                        </tr>

                        <tr>
                            <th>Validité</th>
                            <td>
                                <span th:if="${traitement.actif}" class="badge badge-success">Actif</span>
                                <span th:if="${!traitement.actif}" class="badge badge-danger">Expiré</span>
                            </td>
                        </tr>

                    </tbody>
                </table>
              </div>

            </div>

        </div>

        <!-- COLONNE DROITE (vide pour harmonie) -->
        <div class="col-12 col-md-6"></div>

    </div>

</th:block>
</html>
