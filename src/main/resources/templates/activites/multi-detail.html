<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Activités du résident', 'Activités associées', ~{::section})}">

<th:block th:fragment="section"
          xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <!-- BARRE HAUTE -->
    <div class="top-bar d-flex justify-content-between align-items-center mb-3">

        <a th:href="${from}" class="back-arrow">← Retour</a>

        <!-- Pas de bouton "+" ici : une activité se crée indépendamment du résident -->

    </div>

    <!-- AUCUNE ACTIVITÉ -->
    <div th:if="${#lists.isEmpty(activites)}" class="text-muted text-center mt-4">
        Aucune activité associée à ce résident.
    </div>

    <!-- UNE CARTE PAR ACTIVITÉ -->
    <div th:each="activite : ${activites}" class="card detail-card p-3 mb-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0" th:text="${activite.nom}"></h5>

            <div class="d-flex gap-2">
                <a sec:authorize="hasAnyRole('DIRECTEUR','ADMINISTRATIF','EDUCATEUR')"
                   th:href="@{|/activites/${activite.idActivite}/edit|}"
                   class="btn-circle">
                    <img src="/images/modifier.png" class="icon-26">
                </a>

                <form sec:authorize="hasAnyRole('DIRECTEUR','ADMINISTRATIF')"
                      th:action="@{|/activites/${activite.idActivite}/delete|}"
                      method="post"
                      onsubmit="return confirm('Supprimer cette activité ?');">
                    <button class="btn-circle">
                        <img src="/images/supprimer.png" class="icon-26">
                    </button>
                </form>
            </div>
        </div>

        <div class="table-responsive">
            <table class="detail-table">
                <tbody>
                    <tr><th>Type</th><td th:text="${activite.type}"></td></tr>
                    <tr>
                        <th>Date</th>
                        <td th:text="${#temporals.format(activite.date,'dd/MM/yyyy')}"></td>
                    </tr>
                    <tr><th>Heure de début</th><td th:text="${activite.heureDebut}"></td></tr>
                    <tr><th>Heure de fin</th><td th:text="${activite.heureFin}"></td></tr>
                    <tr><th>Lieu</th><td th:text="${activite.lieu}"></td></tr>
                    <tr><th>Durée (min)</th><td th:text="${activite.duree}"></td></tr>
                    <tr>
                        <th>Responsable</th>
                        <td th:text="${activite.responsable != null ?
                            activite.responsable.nom + ' ' + activite.responsable.prenom
                            : 'Aucun'}">
                        </td>
                    </tr>
                    <tr>
                        <th>Participants</th>
                        <td>
                            <div class="participants-container">
                                <div th:each="p : ${activite.participants}"
                                     class="badge badge-light d-inline-flex align-items-center p-2">
                                    <span th:text="|${p.nom} ${p.prenom}|"></span>
                                </div>
                            </div>
                            <span th:if="${#lists.isEmpty(activite.participants)}"
                                  class="text-muted">Aucun participant.</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>


    </div>

</th:block>
</html>
