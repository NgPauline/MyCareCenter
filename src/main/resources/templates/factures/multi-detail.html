<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Factures du résident', 'Factures associées', ~{::section})}">

<th:block th:fragment="section"
          xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <!-- BARRE HAUTE -->
    <div class="top-bar d-flex justify-content-between align-items-center mb-3">

        <a th:href="${from}" class="back-arrow">← Retour</a>

        <!-- Ajouter une facture -->
        <a sec:authorize="hasAnyRole('DIRECTEUR','FINANCE')"
        th:href="@{/factures/new(from='/factures/auto?resident=' + ${residentId} + '&from=' + ${from})}"
        class="btn-circle">
            <img src="/images/ajouter.png" class="icon-26">
        </a>

    </div>

    <!-- AUCUNE FACTURE -->
    <div th:if="${#lists.isEmpty(factures)}" class="text-muted text-center mt-4">
        Aucune facture associée à ce résident.
    </div>

    <!-- UNE CARTE PAR FACTURE -->
    <div th:each="facture : ${factures}" class="card detail-card p-3 mb-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">Facture #<span th:text="${facture.idFacture}"></span></h5>

            <div class="d-flex gap-2">

                <!-- PDF -->
                <a th:href="@{|/factures/${facture.idFacture}/pdf|}"
                   class="btn-circle" title="Télécharger PDF">
                    <img src="/images/pdf.png" class="icon-26">
                </a>

                <!-- Modifier -->
                <a sec:authorize="hasRole('FINANCE')"
                   th:href="@{|/factures/${facture.idFacture}/edit|}"
                   class="btn-circle">
                    <img src="/images/modifier.png" class="icon-26">
                </a>

                <!-- Supprimer -->
                <form sec:authorize="hasRole('DIRECTEUR')"
                      th:action="@{|/factures/${facture.idFacture}/delete|}"
                      method="post"
                      onsubmit="return confirm('Supprimer cette facture ?');">
                    <button class="btn-circle">
                        <img src="/images/supprimer.png" class="icon-26">
                    </button>
                </form>

            </div>
        </div>

        <div class="table-responsive">
            <table class="detail-table">
                <tbody>
                    <tr><th>Montant</th><td th:text="|${facture.montant} €|"></td></tr>
                    <tr><th>Solde restant</th><td th:text="|${facture.getSoldeRestant()} €|"></td></tr>
                    <tr>
                        <th>Date émission</th>
                        <td th:text="${#temporals.format(facture.dateEmission,'dd/MM/yyyy')}"></td>
                    </tr>
                    <tr>
                        <th>Statut</th>
                        <td>
                            <span class="badge"
                                  th:classappend="${facture.statut == 'PAYEE' ? ' badge-success' :
                                                  facture.statut == 'PARTIELLE' ? ' badge-warning' :
                                                                                  ' badge-secondary'}"
                                  th:text="${facture.statut}">
                            </span>
                        </td>
                    </tr>
                    <tr>
                        <th>Paiements</th>
                        <td>
                            <div class="d-flex flex-column gap-1">
                                <div th:each="p : ${facture.paiements}"
                                     class="badge badge-light d-inline-flex p-2">
                                    <span th:text="|${#temporals.format(p.datePaiement,'dd/MM/yyyy')} — ${p.montant} €|"></span>
                                </div>
                                <span th:if="${#lists.isEmpty(facture.paiements)}"
                                      class="text-muted">Aucun paiement.</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Ajouter un paiement -->
        <div class="mt-2" sec:authorize="hasRole('FINANCE')">
            <a th:href="@{|/paiements/new?factureId=${facture.idFacture}|}"
               class="btn-small gold">
                <img src="/images/ajouter.png" class="icon-20"> Ajouter un paiement
            </a>
        </div>

    </div>

</th:block>
</html>
