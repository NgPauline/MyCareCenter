<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Détails facture', 'Informations générales', ~{::section})}">

<section th:fragment="section"
         xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <!-- MESSAGE GLOBAL -->
    <div th:if="${param.error}" class="alert alert-danger mb-3">
        <span th:switch="${param.error}">
            <span th:case="'payee'">Impossible de modifier cette facture : elle est déjà payée.</span>
            <span th:case="'paiements'">Impossible de supprimer cette facture : des paiements sont associés.</span>
            <span th:case="'introuvable'">Facture introuvable.</span>
            <span th:case="*">Une erreur est survenue.</span>
        </span>
    </div>

    <!-- BARRE HAUTE -->
    <div class="top-bar d-flex justify-content-end align-items-center mb-2">


        <div class="detail-actions d-flex gap-3">

            <!-- PDF -->
            <a th:href="@{/factures/{id}/pdf(id=${facture.idFacture})}"
               class="btn-circle" title="Télécharger PDF">
                <img src="/images/pdf.png" class="icon-26">
            </a>

            <!-- Modifier -->
            <a sec:authorize="hasRole('FINANCE')"
               th:href="@{/factures/{id}/edit(id=${facture.idFacture})}"
               class="btn-circle" title="Modifier">
                <img src="/images/modifier.png" class="icon-26">
            </a>

            <!-- Supprimer -->
            <form sec:authorize="hasRole('DIRECTEUR')"
                  th:action="@{/factures/{id}/delete(id=${facture.idFacture})}"
                  method="post"
                  onsubmit="return confirm('Supprimer cette facture ?');">
                <button class="btn-circle" title="Supprimer">
                    <img src="/images/supprimer.png" class="icon-26">
                </button>
            </form>

        </div>
    </div>

    <!-- TITRE -->
    <div class="text-center mb-3">
        <h2 class="facture-title">
            Facture #<span th:text="${facture.idFacture}"></span>
        </h2>
    </div>

    <!-- CONTENU -->
    <div class="row mt-3">

        <!-- COLONNE GAUCHE -->
        <div class="col-12 col-md-6">

            <!-- INFORMATIONS FACTURE -->
            <div class="card detail-card p-3 mb-4">

                <div class="table-responsive">
                    <table class="detail-table">
                        <tbody>

                        <tr>
                            <th>Résident</th>
                            <td th:text="|${facture.resident.nom} ${facture.resident.prenom}|"></td>
                        </tr>

                        <tr>
                            <th>Montant</th>
                            <td th:text="|${facture.montant} €|"></td>
                        </tr>

                        <tr>
                            <th>Solde restant</th>
                            <td th:text="|${facture.getSoldeRestant()} €|"></td>
                        </tr>

                        <tr>
                            <th>Date émission</th>
                            <td th:text="${#temporals.format(facture.dateEmission,'dd/MM/yyyy')}"></td>
                        </tr>

                        <tr>
                            <th>Statut</th>
                            <td>
                                <span class="badge"
                                      th:classappend="${facture.statut == 'PAYEE' ? ' badge-success' :
                                                      facture.statut == 'PARTIELLE' ? ' badge-warning' :
                                                                                      ' badge-secondary'}"
                                      th:text="${facture.statut}">
                                </span>
                            </td>
                        </tr>

                        </tbody>
                    </table>
                </div>
            </div>

            <!-- PAIEMENTS -->
            <div class="card detail-card p-3">

                <h4 class="mb-3">Paiements</h4>

                <div class="d-flex flex-column">

                    <div th:each="p : ${facture.paiements}"
                         class="badge badge-light d-inline-flex align-items-center mb-2 p-2">

                        <span th:text="|${#temporals.format(p.datePaiement,'dd/MM/yyyy')} — ${p.montant} €|"></span>

                    </div>

                    <div th:if="${#lists.isEmpty(facture.paiements)}">
                        Aucun paiement enregistré.
                    </div>

                </div>

                <!-- Ajouter paiement -->
                <div class="mt-3" sec:authorize="hasRole('FINANCE')">
                    <a th:href="@{/paiements/new(factureId=${facture.idFacture})}"
                       class="btn-small gold">
                        <img src="/images/ajouter.png" class="icon-20">
                        Ajouter un paiement
                    </a>
                </div>

            </div>

        </div>

        <!-- COLONNE DROITE -->
        <div class="col-12 col-md-6"></div>

    </div>

</section>
</html>
