<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout('Planning', '', ~{::section})}">

<section th:fragment="content">

    <!-- MESSAGE GLOBAL -->
    <div th:if="${param.error}" class="alert alert-danger mb-3">
        <span th:switch="${param.error}">
            <span th:case="'introuvable'">Planning introuvable.</span>
            <span th:case="'responsable'">Responsable introuvable.</span>
            <span th:case="'activite'">Activité introuvable.</span>
            <span th:case="*">Une erreur est survenue.</span>
        </span>
    </div>

    <!-- HEADER -->
    <div class="list-header d-flex justify-content-between align-items-center">

        <h2 class="m-0 d-flex align-items-center">
            Planning

            <button class="btn-circle ml-2"
                    data-search-toggle="searchBarPlanning"
                    title="Rechercher un créneau">
                <img th:src="@{/images/rechercher.png}" class="icon-22">
            </button>
        </h2>

        <div class="d-flex align-items-center">

            <!-- Vue calendrier -->
            <a sec:authorize="hasAnyRole('DIRECTEUR','ADMINISTRATIF','SOIGNANT','EDUCATEUR')"
               th:href="@{/plannings/calendar}"
               class="btn-circle mr-2"
               title="Vue calendrier">
                <img th:src="@{/images/calendrier.png}" class="icon-24">
            </a>

            <!-- Ajouter -->
            <a sec:authorize="hasAnyRole('DIRECTEUR','ADMINISTRATIF')"
               th:href="@{/plannings/new}"
               class="btn-circle"
               title="Ajouter un créneau">
                <img th:src="@{/images/ajouter.png}" class="icon-26">
            </a>

        </div>
    </div>

    <!-- BARRE DE RECHERCHE -->
    <form id="searchBarPlanning" class="mt-3" method="get" style="display:none;">
        <div class="input-group">
            <input type="text" name="q" class="form-control"
                   placeholder="Rechercher un créneau..."
                   th:value="${param.q}">
            <div class="input-group-append">
                <button class="btn-gold" type="submit">
                    <img th:src="@{/images/rechercher.png}" class="icon-20">
                </button>
            </div>
        </div>
    </form>

    <!-- TABLEAU PREMIUM -->
    <div class="card mt-3">
        <div class="table-responsive"> 
        <table class="table-modern">

            <thead>
                <tr>
                    <th>Date</th>
                    <th>Heure</th>
                    <th>Employé</th>
                    <th>Activité(s)</th>
                    <th class="text-right">Actions</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="p : ${plannings}">
                    <td th:text="${#temporals.format(p.date, 'dd/MM/yyyy')}"></td>

                    <td th:text="${p.heureDebut + ' - ' + p.heureFin}"></td>

                    <td th:text="${p.responsable != null ? p.responsable.nom + ' ' + p.responsable.prenom : '—'}"></td>

                    <td>
                        <span th:if="${#lists.isEmpty(p.activites)}" class="text-muted">Aucune</span>

                        <span th:each="a, iter : ${p.activites}">
                            <span th:text="${a.nom}"></span>
                            <span th:if="${!iter.last}">, </span>
                        </span>
                    </td>

                    <td class="text-right">

                        <!-- Voir -->
                        <a sec:authorize="hasAnyRole('DIRECTEUR','SOIGNANT','EDUCATEUR','ADMINISTRATIF')"
                           th:href="@{|/plannings/${p.idPlanning}|}"
                           class="btn-circle mr-2"
                           title="Voir le créneau">
                            <img th:src="@{/images/voir.png}" class="icon-24">
                        </a>

                        <!-- Modifier -->
                        <a sec:authorize="hasAnyRole('DIRECTEUR','ADMINISTRATIF')"
                           th:href="@{|/plannings/${p.idPlanning}/edit|}"
                           class="btn-circle mr-2"
                           title="Modifier ce créneau">
                            <img th:src="@{/images/modifier.png}" class="icon-24">
                        </a>

                        <!-- Supprimer -->
                        <form sec:authorize="hasAnyRole('DIRECTEUR','ADMINISTRATIF')"
                              th:action="@{|/plannings/${p.idPlanning}/delete|}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Supprimer ce créneau ?');">
                            <button class="btn-circle" title="Supprimer ce créneau">
                                <img th:src="@{/images/supprimer.png}" class="icon-24">
                            </button>
                        </form>

                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(plannings)}">
                    <td colspan="5" class="text-center text-muted py-3">
                        Aucun créneau trouvé.
                    </td>
                </tr>

            </tbody>

        </table>
        </div>
    </div>

    <!-- PAGINATION -->
<div th:if="${totalPages > 1}" class="d-flex justify-content-center mt-3">
    <nav>
        <ul class="pagination">

            <li class="page-item" th:classappend="${currentPage == 0 ? ' disabled' : ''}">
                <a class="page-link" th:href="@{/plannings(page=${currentPage - 1}, q=${q})}">&laquo;</a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:if="${i >= currentPage - 2 and i <= currentPage + 2}"
                th:classappend="${i == currentPage ? ' active' : ''}">
                <a class="page-link"
                   th:href="@{/plannings(page=${i}, q=${q})}"
                   th:text="${i + 1}"></a>
            </li>

            <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? ' disabled' : ''}">
                <a class="page-link" th:href="@{/plannings(page=${currentPage + 1}, q=${q})}">&raquo;</a>
            </li>

        </ul>
    </nav>
</div>

</section>
</html>
