<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Détails planning', 'Détails du créneau', ~{::section})}">

<th:block th:fragment="section"
          xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <!-- MESSAGE GLOBAL -->
    <div th:if="${param.error}" class="alert alert-danger mb-3">
        <span th:switch="${param.error != null ? param.error[0] : ''}">
            <span th:case="'introuvable'">Planning introuvable.</span>
            <span th:case="'responsable'">Responsable introuvable.</span>
            <span th:case="'activite'">Activité introuvable.</span>
            <span th:case="*">Une erreur est survenue.</span>
        </span>
    </div>

    <!-- TOP BAR : RETOUR + ACTIONS -->
    <div class="top-bar d-flex justify-content-between align-items-center mb-2">

        <a th:href="@{/plannings}" class="btn-circle" title="Retour à la liste">
            <img src="/images/retour.png" class="icon-26">
        </a>

        <div class="detail-actions d-flex gap-3">

            <a sec:authorize="hasAnyRole('DIRECTEUR','ADMINISTRATIF')"
            th:href="@{|/plannings/${planning.idPlanning}/edit|}"
            class="btn-circle">
                <img src="/images/modifier.png" class="icon-26">
            </a>

            <form sec:authorize="hasAnyRole('DIRECTEUR','ADMINISTRATIF')"
                th:action="@{|/plannings/${planning.idPlanning}/delete|}"
                method="post"
                onsubmit="return confirm('Supprimer ce créneau ?');">
                <button class="btn-circle">
                    <img src="/images/supprimer.png" class="icon-26">
                </button>
            </form>

        </div>
    </div>

    <!-- HEADER CENTRÉ -->
    <div class="resident-header text-center">

        <h2 class="resident-name">
            Créneau du <span th:text="${#temporals.format(planning.date,'dd/MM/yyyy')}"></span>
        </h2>

    </div>

    <!-- CONTENU EN DEUX COLONNES -->
    <div class="row mt-4">

        <!-- COLONNE GAUCHE -->
        <div class="col-12 col-md-6">
            <div class="card detail-card p-3">
                <div class="table-responsive">

                    <table class="detail-table">
                        <tbody>

                        <tr>
                            <th>Date</th>
                            <td th:text="${#temporals.format(planning.date,'dd/MM/yyyy')}"></td>
                        </tr>

                        <tr>
                            <th>Heure début</th>
                            <td th:text="${planning.heureDebut}"></td>
                        </tr>

                        <tr>
                            <th>Heure fin</th>
                            <td th:text="${planning.heureFin}"></td>
                        </tr>

                        <!-- RESPONSABLE -->
                        <tr>
                            <th>Employé responsable</th>
                            <td>

                                <span th:if="${planning.responsable != null}"
                                      th:text="|${planning.responsable.nom} ${planning.responsable.prenom}|"></span>

                                <span th:if="${planning.responsable == null}" class="text-muted">—</span>

                                <a th:if="${planning.responsable != null}"
                                   th:href="@{|/employes/${planning.responsable.idPersonne}|}">
                                </a>

                            </td>
                        </tr>

                        <!-- ACTIVITÉS -->
                        <tr>
                            <th>Activités</th>
                            <td>

                                <span th:if="${#lists.isEmpty(planning.activites)}" class="text-muted">Aucune</span>

                                <div th:each="a : ${planning.activites}" class="mb-2">
                                    <span th:text="${a.nom}"></span>

                                </div>

                            </td>
                        </tr>

                        </tbody>
                    </table>

                </div>
            </div>
        </div>

        <!-- COLONNE DROITE (optionnelle) -->
        <div class="col-12 col-md-6">
            <!-- Ajouter contenu si besoin -->
        </div>

    </div>

</th:block>
</html>
