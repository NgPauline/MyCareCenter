<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout('Calendrier', 'Planning — Vue calendrier', ~{::section})}">

<section th:fragment="section">

    <!-- MESSAGE GLOBAL -->
    <div th:if="${param.error}" class="alert alert-danger mb-3">
        <span th:switch="${param.error != null ? param.error[0] : ''}">
            <span th:case="'introuvable'">Planning introuvable.</span>
            <span th:case="'responsable'">Responsable introuvable.</span>
            <span th:case="'activite'">Activité introuvable.</span>
            <span th:case="*">Une erreur est survenue.</span>
        </span>
    </div>

    <!-- HEADER -->
    <div class="list-header d-flex justify-content-between align-items-center">


        <a th:href="@{/plannings}" class="btn-circle" title="Retour">
                <img src="/images/retour.png" class="icon-26">
        </a>


        <h2 class="m-0">Vue calendrier</h2>

        <div></div>
    </div>

    <!-- ACCÈS AUTORISÉ -->
    <div sec:authorize="hasAnyRole('DIRECTEUR','ADMINISTRATIF','SOIGNANT','EDUCATEUR')">
 
    <!-- LÉGENDE DES SOIGNANTS -->
    <div id="calendar-legend" class="legend-container mt-3"></div>

        <div class="card mt-3">
            <div id="calendar"></div>
        </div>

    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            let raw = /*[[${planningsJson}]]*/ "[]";
            const events = (typeof raw === "string") ? JSON.parse(raw) : raw;
            initPlanningCalendar("calendar", events);
            generateLegend(events);
        });
    </script>

    </div>

</section>
</html>
