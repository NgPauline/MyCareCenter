<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Détails paiement', 'Informations générales', ~{::section})}">

<section th:fragment="section"
         xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <!-- MESSAGE GLOBAL -->
    <div th:if="${param.error}" class="alert alert-danger mb-3">
        <span th:switch="${param.error != null ? param.error[0] : ''}">
            <span th:case="'introuvable'">Paiement introuvable.</span>
            <span th:case="'facture'">Facture introuvable.</span>
            <span th:case="'montant'">Le montant dépasse le solde restant de la facture.</span>
            <span th:case="*">Une erreur est survenue.</span>
        </span>
    </div>

    <!-- BARRE HAUTE -->
    <div class="top-bar d-flex justify-content-between align-items-center mb-2">

        <a th:href="${from != null ? from : (residentId != null ? '/paiements?resident=' + residentId : '/paiements')}"
        class="btn-circle" title="Retour">
            <img src="/images/retour.png" class="icon-26">
        </a>

        <div class="detail-actions d-flex gap-3">

            <a sec:authorize="hasAnyRole('DIRECTEUR','FINANCE')"
            th:href="@{/paiements/{id}/edit(id=${paiement.idPaiement}, residentId=${residentId})}"
            class="btn-circle">
                <img src="/images/modifier.png" class="icon-26">
            </a>

            <form sec:authorize="hasAnyRole('DIRECTEUR','FINANCE')"
                th:action="@{/paiements/{id}/delete(id=${paiement.idPaiement})}"
                method="post"
                onsubmit="return confirm('Supprimer ce paiement ?');">
                <input type="hidden" name="from" th:value="${from}">
                <input type="hidden" name="residentId" th:value="${residentId}">
                <button class="btn-circle">
                    <img src="/images/supprimer.png" class="icon-26">
                </button>
            </form>

        </div>
    </div>

    <!-- TITRE -->
    <div class="text-center mb-3">
        <h2 class="paiement-title">
            Paiement #<span th:text="${paiement.idPaiement}"></span>
        </h2>
    </div>

    <!-- CONTENU -->
    <div class="row mt-3">

        <div class="col-12 col-md-6">

            <div class="card detail-card p-3">
                <div class="table-responsive">

                    <table class="detail-table">
                        <tbody>

                        <tr>
                            <th>Montant</th>
                            <td th:text="|${paiement.montant} €|"></td>
                        </tr>

                        <tr>
                            <th>Date</th>
                            <td th:text="${#temporals.format(paiement.datePaiement,'dd/MM/yyyy')}"></td>
                        </tr>

                        <tr>
                            <th>Mode de paiement</th>
                            <td th:text="${paiement.mode}"></td>
                        </tr>

                      <tr>
                            <th>Facture associée</th>
                            <td th:text="|Facture #${paiement.facture.idFacture}|"></td>
                      </tr>
                        <tr>
                            <th>Résident</th>
                            <td th:text="|${paiement.facture.resident.nom} ${paiement.facture.resident.prenom}|"></td>
                        </tr>

                        </tbody>
                    </table>

                </div>
            </div>

        </div>

        <div class="col-12 col-md-6"></div>

    </div>

</section>
</html>
