<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout('Paiements', '', ~{::section})}">

<section th:fragment="section">

    <!-- MESSAGE GLOBAL -->
    <div th:if="${param.error}" class="alert alert-danger mb-3">
        <span th:switch="${param.error}">
            <span th:case="'introuvable'">Paiement introuvable.</span>
            <span th:case="'facture'">Facture introuvable.</span>
            <span th:case="'montant'">Le montant dépasse le solde restant de la facture.</span>
            <span th:case="*">Une erreur est survenue.</span>
        </span>
    </div>


    <!-- HEADER -->
    <div class="list-header d-flex justify-content-between align-items-center">

        <h2 class="m-0 d-flex align-items-center">
            Paiements

            <button class="btn-circle ml-2"
                    data-search-toggle="searchBarPaiements"
                    title="Rechercher un paiement">
                <img th:src="@{/images/rechercher.png}" class="icon-22">
            </button>
        </h2>

        <a sec:authorize="hasAnyRole('DIRECTEUR','FINANCE')"
           th:href="@{/paiements/new}"
           class="btn-circle"
           title="Ajouter un paiement">
            <img th:src="@{/images/ajouter.png}" class="icon-26">
        </a>

    </div>

    <!-- BARRE DE RECHERCHE -->
    <form id="searchBarPaiements" class="mt-3" method="get" style="display:none;">
        <div class="input-group">
            <input type="text" name="q" class="form-control"
                   placeholder="Rechercher un paiement..."
                   th:value="${param.q}">
            <div class="input-group-append">
                <button class="btn-gold" type="submit">
                    <img th:src="@{/images/rechercher.png}" class="icon-20">
                </button>
            </div>
        </div>
    </form>

    <!-- TABLEAU -->
    <div class="card mt-3">
        <div class="table-responsive">

            <table class="table-modern">

                <thead>
                <tr>
                    <th>Facture</th>
                    <th>Résident</th>
                    <th>Montant</th>
                    <th>Date</th>
                    <th>Mode</th>
                    <th class="text-right">Actions</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="p : ${paiements}">
                    <td th:text="'#' + p.facture.idFacture"></td>
                    <td th:text="${p.facture.resident.nom + ' ' + p.facture.resident.prenom}"></td>
                    <td th:text="${p.montant + ' €'}"></td>
                    <td th:text="${p.datePaiement != null ? #temporals.format(p.datePaiement, 'dd/MM/yyyy') : '—'}"></td>
                    <td th:text="${p.mode}"></td>

                    <td class="text-right">

                        <a sec:authorize="hasAnyRole('DIRECTEUR','FINANCE')"
                           th:href="@{/paiements/{id}(id=${p.idPaiement})}"
                           class="btn-circle mr-2">
                            <img th:src="@{/images/voir.png}" class="icon-24">
                        </a>

                        <a sec:authorize="hasAnyRole('DIRECTEUR','FINANCE')"
                           th:href="@{/paiements/{id}/edit(id=${p.idPaiement})}"
                           class="btn-circle mr-2">
                            <img th:src="@{/images/modifier.png}" class="icon-24">
                        </a>

                        <form sec:authorize="hasAnyRole('DIRECTEUR','FINANCE')"
                              th:action="@{/paiements/{id}/delete(id=${p.idPaiement})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Supprimer ce paiement ?');">
                            <button class="btn-circle">
                                <img th:src="@{/images/supprimer.png}" class="icon-24">
                            </button>
                        </form>

                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(paiements)}">
                    <td colspan="6" class="text-center text-muted py-3">
                        Aucun paiement trouvé.
                    </td>
                </tr>

                </tbody>

            </table>

        </div>
    </div>

</section>
</html>
