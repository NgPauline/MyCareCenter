<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Équipement', 'Formulaire équipement', ~{::section})}">
 
<section th:fragment="section" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
 
    <!-- MESSAGE GLOBAL -->
    <div th:if="${param.error}" class="alert alert-danger mb-3">
        <span th:switch="${param.error != null ? param.error[0] : ''}">
            <span th:case="'introuvable'">Équipement introuvable.</span>
            <span th:case="'upload'">Erreur lors du téléversement de l'image.</span>
            <span th:case="*">Une erreur est survenue.</span>
        </span>
    </div>
    <div th:if="${errorStock}" class="alert alert-warning mb-3" th:text="${errorStock}"></div>

    
    <div class="form-header d-flex justify-content-between align-items-center">

        <!-- Bouton retour -->
        <a th:href="${typePreRempli != null ? '/types-equipement/' + typePreRempli.id : (idChambre != null ? '/chambres/' + idChambre : '/types-equipement')}"
        class="btn-circle" title="Retour">
            <img src="/images/retour.png" class="icon-26">
        </a>

        <h2 class="m-0" th:text="${isEdit} ? |Modifier l\'équipement| : 'Affecter un équipement'"></h2>

        <div></div>

    </div>
 
    <!-- FORMULAIRE -->
    <form sec:authorize="hasAnyRole('DIRECTEUR','ADMINISTRATIF')"
          th:action="@{${submitUrl}}"
          th:object="${equipement}"
          method="post"
          enctype="multipart/form-data"
          class="form-card">
 
        <div class="form-grid">
 
            <!-- TYPE D'ÉQUIPEMENT -->
            <div th:if="${typePreRempli != null}">
                <label>Type d'équipement</label>
                <input type="text" class="form-control"
                    th:value="${typePreRempli.nom}" readonly>
                <input type="hidden" name="typeId" th:value="${typePreRempli.id}">
            </div>

            <!-- TYPE LIBRE (accès direct) -->
            <div th:if="${typePreRempli == null and !isEdit}"
                data-combobox
                data-input-id="searchType"
                data-hidden-id="typeSelectionne"
                data-dropdown-id="dropdownTypes"
                style="position:relative;">
                <label>Type d'équipement</label>
                <input type="text" id="searchType" class="form-control"
                    placeholder="Rechercher un type..."
                    autocomplete="off"
                    oninput="filtrer('searchType', 'dropdownTypes')"
                    onfocus="ouvrirDropdown('dropdownTypes')"
                    onblur="fermerDropdown('dropdownTypes')">
                <input type="hidden" name="typeId" id="typeSelectionne">
                <input type="hidden" name="idChambre" th:value="${idChambre}">
                <ul id="dropdownTypes"
                    style="display:none; position:absolute; z-index:999; width:100%;
                        max-height:220px; overflow-y:auto; background:#fff;
                        border:1px solid #ced4da; border-radius:0 0 6px 6px;
                        list-style:none; margin:0; padding:0; box-shadow:0 4px 10px rgba(0,0,0,.1);">
                    <li th:each="t : ${types}"
                        th:attr="data-id=${t.id}, data-nom=${t.nom}"
                        onmousedown="selectionner(this, 'searchType', 'typeSelectionne', 'dropdownTypes')"
                        style="padding:8px 12px; cursor:pointer;"
                        onmouseover="this.style.background='#f5f5f5'"
                        onmouseout="this.style.background='#fff'"
                        th:text="${t.nom}">
                    </li>
                </ul>
            </div>

            <!-- TYPE EN ÉDITION (readonly) -->
            <div th:if="${isEdit}">
                <label>Type d'équipement</label>
                <input type="text" class="form-control"
                    th:value="${equipement.type.nom}" readonly>
            </div>
 
            <!-- ÉTAT -->
            <div>
                <label>État</label>
                <select th:field="*{etat}" class="form-control">
                    <option value="BON">Bon</option>
                    <option value="MOYEN">Moyen</option>
                    <option value="MAUVAIS">Mauvais</option>
                </select>
            </div>
 
            <!-- CORRECTION 2 : name="chambreId" + selected manuel, plus de th:field="*{chambre.idChambre}" -->
            <div>
                <label>Chambre</label>
                <select name="chambreId" class="form-control">
                    <option value="">-- Aucune --</option>
                    <option th:each="c : ${chambres}"
                            th:value="${c.idChambre}"
                            th:selected="${equipement.chambre != null and equipement.chambre.idChambre == c.idChambre}"
                            th:text="'Chambre ' + ${c.numero}">
                    </option>
                </select>
            </div>
 
        </div>
 
        <div class="form-actions mt-3">
            <button class="btn-gold">Enregistrer</button>
            <!-- Bouton Annuler -->
            <a th:href="${typePreRempli != null ? '/types-equipement/' + typePreRempli.id : (idChambre != null ? '/chambres/' + idChambre : '/types-equipement')}"
            class="btn-ghost">Annuler</a>
        </div>
 
    </form>
 
</section>
</html>
