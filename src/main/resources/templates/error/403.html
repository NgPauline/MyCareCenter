<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accès refusé</title>
    <style>
        body {
            font-family: 'Garamond', sans-serif;
            background: #f5f5f5;
            text-align: center;
            padding-top: 80px;
        }
        .box {
            background: white;
            padding: 40px;
            margin: auto;
            width: 400px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #C0392B;
            margin-bottom: 10px;
        }
        p {
            color: #555;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            background: #C9973A;
            color: white;
            border-radius: 6px;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="box">
    <h1>🚫 Accès refusé</h1>
    <p>Vous n'avez pas la permission d'accéder à cette page.</p>
    <a th:href="@{/dashboard}">Retour au tableau de bord</a>
</div>
</body>
</html>
