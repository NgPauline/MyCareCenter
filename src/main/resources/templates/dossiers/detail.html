<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Dossier médical', 'Informations générales', ~{::section})}">

<th:block th:fragment="section"
          xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <!-- MESSAGE GLOBAL -->
    <div th:if="${param.error}" class="alert alert-danger mb-3">
        <span th:switch="${param.error != null ? param.error[0] : ''}">
            <span th:case="'introuvable'">Résident introuvable.</span>
            <span th:case="'sansDossier'">Le résident n’a pas de dossier médical.</span>
            <span th:case="*">Une erreur est survenue.</span>
        </span>
    </div>


    <!-- BARRE HAUTE : RETOUR À GAUCHE + ACTIONS À DROITE -->
        <div class="top-bar d-flex justify-content-between align-items-center mb-2">

        <a th:href="@{/residents/{id}(id=${resident.idPersonne})}"
        class="btn-circle" title="Retour au résident">
            <img src="/images/retour.png" class="icon-26" alt="Retour">
        </a>

        <div class="detail-actions d-flex gap-3">
            <a sec:authorize="hasAnyRole('DIRECTEUR','SOIGNANT')"
            th:href="@{|/dossiers/${resident.idPersonne}/edit|}"
            class="btn-circle">
                <img src="/images/modifier.png" class="icon-26" alt="Modifier">
            </a>
        </div>
    </div>

    <!-- NOM DU RÉSIDENT CENTRÉ -->
    <div class="resident-header text-center mb-2">
        <h2 class="resident-name"
            th:text="|${resident.nom} ${resident.prenom}|"></h2>
    </div>

    <!-- LIENS CONSULTATIONS + TRAITEMENTS SOUS LE NOM -->
    <div class="resident-links text-center mb-4">

        <a th:href="@{|/consultations?resident=${resident.idPersonne}|}"
           class="btn-link-gold mx-3 d-inline-flex align-items-center">
            Voir consultations
        </a>

        <a th:href="@{|/traitements?resident=${resident.idPersonne}|}"
           class="btn-link-gold mx-3 d-inline-flex align-items-center">
            Voir traitements
        </a>

    </div>

    <!-- CONTENU EN DEUX COLONNES -->
    <div class="row mt-3">

        <!-- COLONNE GAUCHE : INFORMATIONS DU DOSSIER -->
        <div class="col-12 col-md-6">
            <div class="card detail-card p-3">

                <div class="table-responsive"> 
                <table class="detail-table">
                    <tbody>

                        <tr>
                            <th>Groupe sanguin</th>
                            <td th:text="${dossier.groupeSanguin}"></td>
                        </tr>

                        <tr>
                            <th>Allergies</th>
                            <td th:text="${dossier.allergies}"></td>
                        </tr>

                        <tr>
                            <th>Observations générales</th>
                            <td th:text="${dossier.observationsGenerales}"></td>
                        </tr>

                        <tr>
                            <th>Date de création</th>
                            <td th:text="${#temporals.format(dossier.dateCreation,'dd/MM/yyyy')}"></td>
                        </tr>

                    </tbody>
                </table>
                </div>
            </div>
        </div>

        <!-- COLONNE DROITE (vide pour l’instant) -->
        <div class="col-12 col-md-6">
            <!-- ajouter un bloc plus tard si besoin -->
        </div>

    </div>

</th:block>
</html>
