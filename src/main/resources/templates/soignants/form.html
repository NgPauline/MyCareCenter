<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Soignant', 'Formulaire soignant', ~{::section})}">

<section th:fragment="content" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <!-- MESSAGE GLOBAL -->
    <div th:if="${param.error}" class="alert alert-danger mb-3">
        Une erreur est survenue.
    </div>

    <div class="form-header d-flex justify-content-between align-items-center">
        <h2 class="m-0" th:text="${isEdit} ? 'Modifier le soignant' : 'Ajouter un soignant'"></h2>
        <div></div>
    </div>

    <form sec:authorize="hasRole('DIRECTEUR','ADMINISTRATIF')"
          th:action="@{${submitUrl}}" th:object="${soignant}"
          method="post" class="form-card">

        <div class="form-grid">

            <div>
                <label>Nom</label>
                <input type="text" th:field="*{nom}" class="form-control">
                <div class="error" th:errors="*{nom}"></div>
            </div>

            <div>
                <label>Prénom</label>
                <input type="text" th:field="*{prenom}" class="form-control">
                <div class="error" th:errors="*{prenom}"></div>
            </div>

            <div>
                <label>Date de naissance</label>
                <input type="date" th:field="*{dateNaissance}" class="form-control">
                <div class="error" th:errors="*{dateNaissance}"></div>
            </div>

            <div>
                <label>Téléphone</label>
                <input type="text" th:field="*{telephone}" class="form-control">
                <div class="error" th:errors="*{telephone}"></div>
            </div>

            <div>
                <label>Adresse</label>
                <input type="text" th:field="*{adresse}" class="form-control">
                <div class="error" th:errors="*{adresse}"></div>
            </div>

            <div>
                <label>Matricule</label>
                <input type="text" th:field="*{matricule}" th:disabled="${isEdit}" class="form-control">
                <div class="error" th:errors="*{matricule}"></div>
            </div>

            <div>
                <label>Poste</label>
                <input type="text" th:field="*{poste}" class="form-control">
                <div class="error" th:errors="*{poste}"></div>
            </div>

            <div>
                <label>Salaire (€)</label>
                <input type="number" step="0.01" th:field="*{salaire}" class="form-control">
                <div class="error" th:errors="*{salaire}"></div>
            </div>

            <div>
                <label>Diplôme</label>
                <input type="text" th:field="*{diplome}" class="form-control">
                <div class="error" th:errors="*{diplome}"></div>
            </div>

            <div>
                <label>Spécialité</label>
                <input type="text" th:field="*{specialite}" class="form-control">
                <div class="error" th:errors="*{specialite}"></div>
            </div>

        </div>

        <div class="form-actions mt-3">
            <button class="btn-gold">Enregistrer</button>
            <a th:href="@{/soignants}" class="btn-ghost">Annuler</a>
        </div>

    </form>

</section>
</html>
