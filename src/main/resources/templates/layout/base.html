<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, pageTitle, section)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">App</title>
    <link rel="icon" type="image/png" th:href="@{/images/logo.png}">

    <!-- CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" th:href="@{/css/calendar.css}">

</head>

<body class="hold-transition sidebar-mini layout-fixed">

<div class="wrapper">

    <nav th:replace="~{layout/header :: header}"></nav>
    <aside th:replace="~{layout/sidebar :: sidebar}"></aside>

    <div class="content-wrapper">

        <div class="app-main-header">
            <h1 class="page-title" th:text="${pageTitle}"></h1>
        </div>

        <section class="app-content">
            <div th:replace="${section}"></div>
        </section>

    </div>

    <footer th:replace="~{layout/footer :: footer}"></footer>

</div>

<div id="lightbox" class="lightbox" onclick="this.classList.remove('show')">
    <img id="lightbox-img" src="">
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.11/locales/fr.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/combobox.js}"></script>
<script th:src="@{/js/calendar.js}"></script>

</body>
</html>
