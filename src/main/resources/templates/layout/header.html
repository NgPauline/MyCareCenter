<nav class="main-header navbar navbar-expand navbar-white navbar-light" 
     th:fragment="header"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <!-- GAUCHE : Slogan -->
    <div class="navbar-text d-flex flex-column">
        <span class="header-slogan">CHANGEONS DE REGARD SUR LES AUTRES !</span>
        <span class="header-subtext">80% des handicaps sont invisibles</span>
    </div>

    <!-- DROITE : Utilisateur + Déconnexion -->
    <ul class="navbar-nav ml-auto d-flex align-items-center">

        <!-- Nom de l'utilisateur connecté -->
        <li class="nav-item mr-4 d-flex align-items-center">
            <i class="fas fa-user-circle text-dark mr-2" style="font-size: 1.4rem;"></i>

            <div>
                <div>
                    <span class="text-dark font-weight-bold"
                          sec:authentication="principal.prenom"></span>
                    &nbsp;
                    <span class="text-dark font-weight-bold"
                          sec:authentication="principal.nom"></span>
                </div>
                <small class="text-muted" style="font-size: 0.78rem; display:block;"
                       sec:authentication="principal.poste"></small>
            </div>

        </li>

        <!-- Déconnexion -->
        <li class="nav-item">
            <a class="nav-link text-danger" th:href="@{/logout}">
                <i class="fas fa-sign-out-alt"></i> Déconnexion
            </a>
        </li>

    </ul>

</nav>
