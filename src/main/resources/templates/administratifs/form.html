<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Administratif', 'Formulaire administratif', ~{::section})}">

<section th:fragment="section" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <!-- MESSAGE GLOBAL -->
    <div th:if="${param.error}" class="alert alert-danger mb-3">
        <span th:switch="${param.error}">
            <span th:case="'planning'">Impossible de supprimer quelqu'un qui est responsable d’un planning.</span>
            <span th:case="'acces'">Accès refusé.</span>
            <span th:case="*">Une erreur est survenue.</span>
        </span>
    </div>

    <div class="top-bar d-flex justify-content-end align-items-center mb-2">
        
        <h2 class="m-0" th:text="${isEdit} ? 'Modifier un administratif' : 'Ajouter un administratif'"></h2>
        <div></div>
    </div>

    <!-- FORMULAIRE -->
    <form sec:authorize="hasRole('DIRECTEUR')"
          th:action="@{${submitUrl}}" th:object="${administratif}"
          method="post" class="form-card">

        <div class="form-grid">

            <div>
                <label>Nom</label>
                <input type="text" th:field="*{nom}" class="form-control">
                <div class="error" th:errors="*{nom}"></div>
            </div>

            <div>
                <label>Prénom</label>
                <input type="text" th:field="*{prenom}" class="form-control">
                <div class="error" th:errors="*{prenom}"></div>
            </div>

            <div>
                <label>Date de naissance</label>
                <input type="date" th:field="*{dateNaissance}" class="form-control">
                <div class="error" th:errors="*{dateNaissance}"></div>
            </div>

            <div>
                <label>Téléphone</label>
                <input type="text" th:field="*{telephone}" class="form-control">
                <div class="error" th:errors="*{telephone}"></div>
            </div>

            <div>
                <label>Adresse</label>
                <input type="text" th:field="*{adresse}" class="form-control">
                <div class="error" th:errors="*{adresse}"></div>
            </div>

            <div>
                <label>Matricule</label>
                <input type="text" th:field="*{matricule}" th:disabled="${isEdit}" class="form-control">
                <div class="error" th:errors="*{matricule}"></div>
            </div>

            <div>
                <label>Poste</label>
                <input type="text" th:field="*{poste}" class="form-control">
                <div class="error" th:errors="*{poste}"></div>
            </div>

            <div>
                <label>Salaire (€)</label>
                <input type="number" step="0.01" th:field="*{salaire}" class="form-control">
                <div class="error" th:errors="*{salaire}"></div>
            </div>

            <div>
                <label>Fonction</label>
                <input type="text" th:field="*{fonction}" class="form-control">
                <div class="error" th:errors="*{fonction}"></div>
            </div>

        </div>

        <div class="form-actions mt-3">
            <button class="btn-gold">Enregistrer</button>
            <a th:href="@{/administratifs}" class="btn-ghost">Annuler</a>
        </div>

    </form>

</section>
</html>
