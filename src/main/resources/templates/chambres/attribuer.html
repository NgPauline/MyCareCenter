<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Attribuer une chambre', 'Attribuer un résident', ~{::section})}">

<section th:fragment="section" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <!-- MESSAGE GLOBAL -->
    <div th:if="${param.error}" class="alert alert-danger mb-3">
        <span th:switch="${param.error != null ? param.error[0] : ''}">
            <span th:case="'occupee'">Impossible d’attribuer cette chambre : elle est déjà occupée.</span>
            <span th:case="'acces'">Accès refusé.</span>
            <span th:case="*">Une erreur est survenue.</span>
        </span>
    </div>

    <!-- HEADER -->
    <div class="form-header d-flex justify-content-between align-items-center">
        <h2 class="m-0">Attribuer un résident</h2>
        <div></div>
    </div>

    <!-- FORMULAIRE -->
    <form th:action="@{|/chambres/${chambre.idChambre}/attribuer|}"
          method="post"
          class="form-card">

        <div class="form-grid">

            <!-- Chambre -->
            <div>
                <label>Chambre</label>
                <input type="text"
                       class="form-control"
                       th:value="${chambre.numero}"
                       readonly>
            </div>

            <!-- Résident -->
            <div>
                <label>Résident à attribuer</label>
                <select name="residentId" class="form-control" required>
                    <option value="" disabled selected>Choisir un résident</option>

                    <option th:each="r : ${residents}"
                            th:value="${r.idPersonne}"
                            th:text="${r.nom + ' ' + r.prenom}">
                    </option>
                </select>
            </div>

        </div>

        <!-- ACTIONS -->
        <div class="form-actions mt-3">
            <button class="btn-gold">Attribuer</button>
            <a th:href="@{|/chambres/${chambre.idChambre}|}" class="btn-ghost">Annuler</a>
        </div>

    </form>

</section>
</html>
