<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout('Type_Equipement', 'Formulaire des types d\'équipements', ~{::section})}">

<section th:fragment="section">

    <div class="form-header d-flex justify-content-between align-items-center">

        <a th:href="${typePreRempli != null ? '/types-equipement/' + typePreRempli.id : (idChambre != null ? '/chambres/' + idChambre : '/types-equipement')}"
        class="btn-circle" title="Retour">
            <img src="/images/retour.png" class="icon-26">
        </a>

        <h2 class="m-0" th:text="${isEdit} ? 'Modifier un type' : 'Nouveau type'"></h2>

        <div></div>

    </div>

    <form sec:authorize="hasAnyRole('DIRECTEUR','ADMINISTRATIF')"
          th:action="@{${submitUrl}}" th:object="${typeEquipement}" method="post"
          enctype="multipart/form-data" class="form-card">

        <div class="form-grid">

            <div>
                <label>Nom</label>
                <input type="text" th:field="*{nom}" class="form-control" required>
            </div>

            <div>
                <label>Quantité totale</label>
                <input type="number" th:field="*{quantiteTotale}" class="form-control" min="1" required>
            </div>

            <div>
                <label>Photo</label>
                <input type="file" name="photoFile" class="form-control-file">
                <div th:if="${typeEquipement.photoPath != null}" class="mt-2">
                    <img th:src="@{|/uploads/types/${typeEquipement.photoPath}|}"
                         alt="Photo actuelle"
                         style="width:120px;height:120px;object-fit:cover;border-radius:8px;">
                </div>
            </div>

        </div>

        <div class="form-actions mt-3">
            <button type="submit" class="btn-gold">Enregistrer</button>
            <a th:href="${typePreRempli != null ? '/types-equipement/' + typePreRempli.id : (idChambre != null ? '/chambres/' + idChambre : '/types-equipement')}"
            class="btn-ghost">Annuler</a>
        </div>

    </form>

</section>
</html>
