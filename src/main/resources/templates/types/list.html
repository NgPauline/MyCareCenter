<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout('Types equipement', '', ~{::section})}">

<section th:fragment="section">

    <div class="list-header d-flex justify-content-between align-items-center">

    <h2 class="m-0 d-flex align-items-center">
            Catalogue des équipements

            <!-- ✅ Bouton recherche -->
            <button class="btn-circle ml-2"
                    data-search-toggle="searchBarTypes"
                    title="Rechercher un type">
                <img th:src="@{/images/rechercher.png}" class="icon-22">
            </button>
        </h2>

        <a sec:authorize="hasAnyRole('DIRECTEUR','ADMINISTRATIF')"
        th:href="@{/types-equipement/new}" class="icon-btn">
            <img th:src="@{/images/ajouter.png}" class="icon-26">
        </a>

    </div>

    <!-- ✅ Barre de recherche -->
    <form id="searchBarTypes" class="mt-3" method="get" style="display:none;">
        <div class="input-group">
            <input type="text" name="q" class="form-control"
                placeholder="Rechercher un type d'équipement..."
                th:value="${param.q}">
            <div class="input-group-append">
                <button class="btn-gold" type="submit">
                    <img th:src="@{/images/rechercher.png}" class="icon-20">
                </button>
            </div>
        </div>
    </form>

    <div class="equipements-grid mt-4">

        <div class="equipement-card" th:each="t : ${types}">

            <a th:href="@{/types-equipement/{id}(id=${t.id})}" style="text-decoration:none; color:inherit;">
                <div class="equipement-photo">
                    <img th:src="${t.photoPath != null}
                            ? @{|/uploads/types/${t.photoPath}|}
                            : @{/images/default-equipement.png}">
                </div>
            </a>

            <h3 class="equipement-nom" th:text="${t.nom}"></h3>

                <div class="type-stock-line">
                    <span><strong>Total :</strong> <span th:text="${t.quantiteTotale}"></span></span>
                    <span><strong>Utilisés :</strong> <span th:text="${utilisesMap[t.id]}"></span></span>
                    <span><strong>Restants :</strong> <span th:text="${restantsMap[t.id]}"></span></span>
                </div>


            <div class="equipement-actions d-flex justify-content-between mt-3">

                <a sec:authorize="hasAnyRole('DIRECTEUR','ADMINISTRATIF')"
                th:href="@{|/types-equipement/${t.id}/edit|}" class="icon-btn-small">
                    <img th:src="@{/images/modifier.png}" class="icon-20">
                </a>

                <form sec:authorize="hasAnyRole('DIRECTEUR','ADMINISTRATIF')"
              th:action="@{|/types-equipement/${t.id}/delete|}" method="post"
                      onsubmit="return confirm('Supprimer ce type ?');">
                    <button class="btn-circle">
                        <img th:src="@{/images/supprimer.png}" class="icon-20">
                    </button>

                </form>

            </div>

        </div>

        <div th:if="${#lists.isEmpty(types)}"
             class="text-center text-muted py-4 col-12">
            Aucun type d'équipement.
        </div>

    </div>

</section>
</html>
